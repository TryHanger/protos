version: "3"

tasks:
  generate:
    aliases:
      - gen
    desc: "Generate code from proto files"
    cmds:
      # Создаем папку, если она не существует (чтобы protoc не ругался)
      - powershell -Command "mkdir -Force gen/go"
      # Запускаем генерацию
      - >
        protoc -I proto 
        proto/sso/*.proto 
        --go_out=./gen/go 
        --go_opt=paths=source_relative 
        --go-grpc_out=./gen/go 
        --go-grpc_opt=paths=source_relative